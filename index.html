<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Image Converter</title>

<!-- TIFF -->
<script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.js"></script>

<!-- HEIC стабильный decoder -->
<script src="https://cdn.jsdelivr.net/npm/libheif-js@1.16.2/libheif.min.js"></script>

<!-- ZIP -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>
:root{
--bg:#0b1220;
--card:#131d33;
--accent:#7c5cff;
--accent2:#23c4a8;
--text:#eaf0ff;
--muted:#7d8aa8;
--border:rgba(255,255,255,.08);
}

body{
margin:0;
background:
radial-gradient(1200px 600px at 5% -10%,rgba(124,92,255,.25),transparent 60%),
radial-gradient(1000px 600px at 95% 0%,rgba(35,196,168,.2),transparent 60%),
var(--bg);
color:var(--text);
font-family:system-ui;
}

.container{
max-width:1400px;
margin:40px auto;
padding:0 30px;
}

h1{margin:0 0 8px;font-size:28px}
.subtitle{color:var(--muted);margin-bottom:25px}

.layout{
display:grid;
grid-template-columns: 1.3fr 1fr;
gap:25px;
}

.card{
background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
border:1px solid var(--border);
border-radius:16px;
padding:22px;
}

.drop{
border:2px dashed rgba(255,255,255,.2);
border-radius:14px;
padding:35px;
text-align:center;
cursor:pointer;
color:var(--muted);
transition:.2s;
margin-bottom:20px;
}

.drop:hover{
border-color:var(--accent);
background:rgba(124,92,255,.07);
}

input[type=file]{display:none;}

.controls{
display:flex;
gap:12px;
flex-wrap:wrap;
align-items:center;
}

button{
padding:10px 18px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:600;
}

.primary{
background:linear-gradient(135deg,var(--accent),var(--accent2));
color:white;
}

.secondary{
background:rgba(255,255,255,.08);
color:var(--text);
}

button:disabled{opacity:.4}

.progress{
height:6px;
background:rgba(255,255,255,.08);
border-radius:999px;
overflow:hidden;
margin-top:15px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--accent),var(--accent2));
transition:.3s;
}

.file{
display:flex;
justify-content:space-between;
padding:12px 14px;
border-radius:12px;
background:rgba(255,255,255,.05);
border:1px solid var(--border);
margin-bottom:10px;
font-size:13px;
}

.status.done{color:var(--accent2)}
.status.error{color:#ff5c7a}

@media(max-width:1100px){
.layout{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="container">

<h1>Конвертер изображений</h1>
<div class="subtitle">
1) Добавь файлы → 2) Нажми «Конвертировать» → 3) Скачай ZIP.  
HEIC / TIFF / IMG → JPG. Всё локально.
</div>

<div class="layout">

<!-- ЛЕВАЯ КОЛОНКА -->
<div class="card">

<div class="drop" id="drop">
Перетащи файлы сюда или нажми
<input type="file" id="fileInput" multiple
accept=".jpg,.jpeg,.png,.webp,.tif,.tiff,.heic,.heif,.img,image/*">
</div>

<div class="controls">
<label>Качество JPG</label>
<input type="number" id="quality" value="0.92" min="0.5" max="1" step="0.01">
<button class="primary" id="convertBtn">Конвертировать</button>
<button class="secondary" id="zipBtn" disabled>Скачать ZIP</button>
<button class="secondary" id="clearBtn">Очистить</button>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>

</div>

<!-- ПРАВАЯ КОЛОНКА -->
<div class="card">
<h3 style="margin-top:0">Очередь</h3>
<div id="fileList"></div>
</div>

</div>
</div>

<script>
const input=document.getElementById("fileInput");
const drop=document.getElementById("drop");
const list=document.getElementById("fileList");
const bar=document.getElementById("bar");
const zipBtn=document.getElementById("zipBtn");

let items=[];

function fmt(n){return (n/1024/1024).toFixed(2)+" MB";}
function ext(n){return n.split(".").pop().toLowerCase();}
function base(n){return n.replace(/\.[^/.]+$/,"");}

drop.onclick=()=>input.click();
input.onchange=e=>add(e.target.files);
drop.ondragover=e=>e.preventDefault();
drop.ondrop=e=>{
e.preventDefault();
add(e.dataTransfer.files);
};

function add(files){
for(const f of files){
items.push({file:f,status:"queued"});
}
render();
}

function render(){
list.innerHTML="";
items.forEach(i=>{
const d=document.createElement("div");
d.className="file";
d.innerHTML=`
<span>${i.file.name} (${fmt(i.file.size)})</span>
<span class="status ${i.status}">${i.status}</span>
`;
list.appendChild(d);
});
}

async function decodeHEIC(file){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.onload=function(){
const decoder=new libheif.HeifDecoder();
const data=decoder.decode(reader.result);
if(!data||!data.length)return reject();
const img=data[0];
img.display().then(canvas=>{
canvas.toBlob(resolve,"image/jpeg",0.92);
});
};
reader.readAsArrayBuffer(file);
});
}

async function convertOne(it,q){
const e=ext(it.file.name);

// HEIC
if(e==="heic"||e==="heif"){
return await decodeHEIC(it.file);
}

// TIFF
if(e==="tif"||e==="tiff"){
const buf=await it.file.arrayBuffer();
const ifds=UTIF.decode(buf);
UTIF.decodeImage(buf,ifds[0]);
const rgba=UTIF.toRGBA8(ifds[0]);
const c=document.createElement("canvas");
c.width=ifds[0].width;
c.height=ifds[0].height;
c.getContext("2d").putImageData(
new ImageData(new Uint8ClampedArray(rgba),
ifds[0].width,
ifds[0].height),0,0);
return await new Promise(r=>c.toBlob(r,"image/jpeg",q));
}

// остальные
const img=await createImageBitmap(it.file);
const c=document.createElement("canvas");
c.width=img.width;
c.height=img.height;
c.getContext("2d").drawImage(img,0,0);
img.close();
return await new Promise(r=>c.toBlob(r,"image/jpeg",q));
}

document.getElementById("convertBtn").onclick=async()=>{
const q=parseFloat(document.getElementById("quality").value);
let done=0;

for(const it of items){
it.status="processing";render();
try{
it.blob=await convertOne(it,q);
it.status="done";
}catch{
it.status="error";
}
done++;
bar.style.width=(done/items.length*100)+"%";
render();
}
zipBtn.disabled=!items.some(i=>i.blob);
};

zipBtn.onclick=async()=>{
const zip=new JSZip();
items.filter(i=>i.blob).forEach(i=>{
zip.file(base(i.file.name)+".jpg",i.blob);
});
const blob=await zip.generateAsync({type:"blob"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="converted_images.zip";
a.click();
};

document.getElementById("clearBtn").onclick=()=>{
items=[];
bar.style.width="0%";
zipBtn.disabled=true;
render();
};
</script>
</body>
</html>
