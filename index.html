<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>HEIC / TIFF / IMG → JPG конвертер</title>

<script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>
body{background:#0b1220;color:#e8eefc;font-family:system-ui;margin:0;padding:30px}
button{padding:8px 14px;margin:6px;border-radius:8px;border:1px solid #444;background:#222;color:#fff;cursor:pointer}
button:disabled{opacity:.5}
input{margin:6px}
table{width:100%;margin-top:20px;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #333}
.progress{height:8px;background:#222;margin-top:10px}
.bar{height:100%;background:#7c5cff;width:0%}
</style>
</head>

<body>

<h2>Пакетный конвертер в JPG</h2>

<input type="file" id="fileInput" multiple
accept=".jpg,.jpeg,.png,.webp,.tif,.tiff,.heic,.heif,.img,image/*">

<br>

<label>Качество JPG (0.5–1.0)</label>
<input type="number" id="quality" value="0.92" min="0.5" max="1" step="0.01">

<br>

<button id="convertBtn">Конвертировать</button>
<button id="zipBtn" disabled>Скачать ZIP</button>
<button id="clearBtn">Очистить</button>

<div class="progress"><div class="bar" id="bar"></div></div>

<table>
<thead>
<tr>
<th>Файл</th>
<th>Размер</th>
<th>Статус</th>
<th>Скачать</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
const fileInput = document.getElementById("fileInput");
const tbody = document.getElementById("tbody");
const bar = document.getElementById("bar");
const zipBtn = document.getElementById("zipBtn");

let items = [];

function ext(name){return name.split(".").pop().toLowerCase();}
function base(name){return name.replace(/\.[^/.]+$/,"");}
function fmt(n){return (n/1024/1024).toFixed(2)+" MB";}

fileInput.addEventListener("change",e=>{
  items=[];
  tbody.innerHTML="";
  Array.from(e.target.files).forEach(f=>{
    items.push({file:f,status:"queued"});
  });
  render();
});

document.getElementById("clearBtn").onclick=()=>{
  items=[];
  tbody.innerHTML="";
  bar.style.width="0%";
  zipBtn.disabled=true;
};

function render(){
  tbody.innerHTML="";
  items.forEach((it,i)=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${it.file.name}</td>
      <td>${fmt(it.file.size)}</td>
      <td>${it.status}</td>
      <td>${it.blob?`<a download="${it.outName}" href="${URL.createObjectURL(it.blob)}">JPG</a>`:"-"}</td>
    `;
    tbody.appendChild(tr);
  });
}

function canvasFromRGBA(rgba,w,h){
  const c=document.createElement("canvas");
  c.width=w;c.height=h;
  const ctx=c.getContext("2d");
  ctx.putImageData(new ImageData(new Uint8ClampedArray(rgba),w,h),0,0);
  return c;
}

async function decodeTIFF(file){
  const buf=await file.arrayBuffer();
  const ifds=UTIF.decode(buf);
  UTIF.decodeImage(buf,ifds[0]);
  const rgba=UTIF.toRGBA8(ifds[0]);
  return canvasFromRGBA(rgba,ifds[0].width,ifds[0].height);
}

async function decodeGeneric(file){
  const img=await createImageBitmap(file);
  const c=document.createElement("canvas");
  c.width=img.width;c.height=img.height;
  c.getContext("2d").drawImage(img,0,0);
  img.close();
  return c;
}

async function toJpeg(canvas,quality){
  return new Promise(r=>canvas.toBlob(r,"image/jpeg",quality));
}

async function convertOne(it,quality){

  const e=ext(it.file.name);

  if(e==="heic"||e==="heif"){
    const out=await heic2any({blob:it.file,toType:"image/jpeg",quality});
    const blob=Array.isArray(out)?out[0]:out;
    const canvas=await decodeGeneric(blob);
    return await toJpeg(canvas,quality);
  }

  if(e==="tif"||e==="tiff"){
    const canvas=await decodeTIFF(it.file);
    return await toJpeg(canvas,quality);
  }

  // img или любой другой image/*
  const canvas=await decodeGeneric(it.file);
  return await toJpeg(canvas,quality);
}

document.getElementById("convertBtn").onclick=async()=>{
  const quality=parseFloat(document.getElementById("quality").value);
  let done=0;

  for(const it of items){
    it.status="processing";
    render();

    try{
      const blob=await convertOne(it,quality);
      it.blob=blob;
      it.outName=base(it.file.name)+".jpg";
      it.status="done";
    }catch(e){
      console.error(e);
      it.status="error";
    }

    done++;
    bar.style.width=((done/items.length)*100)+"%";
    render();
  }

  zipBtn.disabled=!items.some(i=>i.blob);
};

zipBtn.onclick=async()=>{
  const zip=new JSZip();
  items.filter(i=>i.blob).forEach(i=>{
    zip.file(i.outName,i.blob);
  });
  const blob=await zip.generateAsync({type:"blob"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="converted_jpg.zip";
  a.click();
};
</script>

</body>
</html>
