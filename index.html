<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Конвертер изображений</title>

<script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.js"></script>
<script src="https://cdn.jsdelivr.net/npm/libheif-js@1.16.2/libheif.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>
:root{
--bg:#0b1220;
--accent:#7c5cff;
--accent2:#23c4a8;
--text:#eaf0ff;
--muted:#7d8aa8;
--border:rgba(255,255,255,.08);
}

body{
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
background:
radial-gradient(1200px 600px at 5% -10%,rgba(124,92,255,.25),transparent 60%),
radial-gradient(1000px 600px at 95% 0%,rgba(35,196,168,.2),transparent 60%),
var(--bg);
color:var(--text);
font-family:system-ui;
}

.container{
max-width:1400px;
margin:30px auto;
padding:0 30px;
flex:1;
}

.layout{
display:grid;
grid-template-columns:1.4fr 1fr;
gap:25px;
align-items:stretch;
}

.card{
background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
border:1px solid var(--border);
border-radius:16px;
padding:22px;
display:flex;
flex-direction:column;
}

.drop{
border:2px dashed rgba(255,255,255,.2);
border-radius:14px;
padding:30px;
text-align:center;
cursor:pointer;
color:var(--muted);
margin-bottom:20px;
}

.controls{
display:flex;
gap:12px;
flex-wrap:wrap;
align-items:center;
}

button{
padding:10px 18px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:600;
}

.primary{
background:linear-gradient(135deg,var(--accent),var(--accent2));
color:white;
}

.secondary{
background:rgba(255,255,255,.08);
color:var(--text);
}

.progress{
height:6px;
background:rgba(255,255,255,.08);
border-radius:999px;
overflow:hidden;
margin-top:15px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--accent),var(--accent2));
transition:.3s;
}

.file{
display:flex;
justify-content:space-between;
padding:12px;
border-radius:10px;
background:rgba(255,255,255,.05);
border:1px solid var(--border);
margin-bottom:8px;
font-size:13px;
}

.status.done{color:var(--accent2)}
.status.error{color:#ff5c7a}

@media(max-width:1100px){
.layout{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">

<h2>Конвертер изображений</h2>
<p style="color:var(--muted)">
Добавь файлы → Конвертируй → Скачай ZIP. Всё локально.
</p>

<div class="layout">

<div class="card">
<div class="drop" id="drop">
Перетащи файлы или нажми
<input type="file" id="input" multiple
accept=".jpg,.jpeg,.png,.webp,.tif,.tiff,.heic,.heif,.img,image/*">
</div>

<div class="controls">
<label>Качество JPG</label>
<input type="number" id="quality" value="0.9" step="0.01" min="0.5" max="1">
<button class="primary" id="convert">Конвертировать</button>
<button class="secondary" id="zip" disabled>Скачать ZIP</button>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>
</div>

<div class="card">
<h3 style="margin-top:0">Очередь</h3>
<div id="list"></div>
</div>

</div>
</div>

<script>
const input=document.getElementById("input");
const drop=document.getElementById("drop");
const list=document.getElementById("list");
const bar=document.getElementById("bar");
const zipBtn=document.getElementById("zip");

let items=[];

function fmt(n){return (n/1024/1024).toFixed(2)+" MB";}
function ext(n){return n.split(".").pop().toLowerCase();}
function base(n){return n.replace(/\.[^/.]+$/,"");}

drop.onclick=()=>input.click();
input.onchange=e=>add(e.target.files);
drop.ondragover=e=>e.preventDefault();
drop.ondrop=e=>{
e.preventDefault();
add(e.dataTransfer.files);
};

function add(files){
for(const f of files){
items.push({file:f,status:"queued"});
}
render();
}

function render(){
list.innerHTML="";
items.forEach(i=>{
const d=document.createElement("div");
d.className="file";
d.innerHTML=`
<span>${i.file.name} (${fmt(i.file.size)})</span>
<span class="status ${i.status}">${i.status}</span>
`;
list.appendChild(d);
});
}

async function resizeCanvas(canvas){
if(canvas.width<=3000)return canvas;
const scale=3000/canvas.width;
const c=document.createElement("canvas");
c.width=3000;
c.height=canvas.height*scale;
c.getContext("2d").drawImage(canvas,0,0,c.width,c.height);
return c;
}

async function decodeHEIC(file){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.onload=function(){
const decoder=new libheif.HeifDecoder();
const data=decoder.decode(reader.result);
if(!data||!data.length)return reject();
const img=data[0];
img.display().then(async canvas=>{
canvas=await resizeCanvas(canvas);
canvas.toBlob(resolve,"image/jpeg",0.9);
});
};
reader.readAsArrayBuffer(file);
});
}

async function convertOne(it,q){
const e=ext(it.file.name);

if(e==="heic"||e==="heif")
return await decodeHEIC(it.file);

const img=await createImageBitmap(it.file);
let c=document.createElement("canvas");
c.width=img.width;
c.height=img.height;
c.getContext("2d").drawImage(img,0,0);
img.close();
c=await resizeCanvas(c);
return await new Promise(r=>c.toBlob(r,"image/jpeg",q));
}

// параллельная обработка по 2 файла
document.getElementById("convert").onclick=async()=>{
const q=parseFloat(document.getElementById("quality").value);
let active=0,index=0,done=0;

return new Promise(resolve=>{
function next(){
if(index>=items.length&&active===0){
zipBtn.disabled=!items.some(i=>i.blob);
return resolve();
}
while(active<2&&index<items.length){
const it=items[index++];
it.status="processing";render();
active++;
convertOne(it,q).then(blob=>{
it.blob=blob;
it.status="done";
}).catch(()=>{
it.status="error";
}).finally(()=>{
active--;
done++;
bar.style.width=(done/items.length*100)+"%";
render();
next();
});
}
}
next();
});
};

zipBtn.onclick=async()=>{
const zip=new JSZip();
items.filter(i=>i.blob).forEach(i=>{
zip.file(base(i.file.name)+".jpg",i.blob);
});
const blob=await zip.generateAsync({type:"blob"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="converted_images.zip";
a.click();
};
</script>

</body>
</html>
