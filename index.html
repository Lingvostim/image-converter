<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Конвертер изображений</title>

<script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>
:root{
--bg:#0b1220;
--card:#121b2e;
--accent:#7c5cff;
--accent2:#23c4a8;
--text:#eaf0ff;
--muted:#7d8aa8;
--border:rgba(255,255,255,.08);
--radius:14px;
}

*{box-sizing:border-box}

body{
margin:0;
background:
radial-gradient(800px 400px at 10% -10%,rgba(124,92,255,.25),transparent 60%),
radial-gradient(600px 400px at 90% 10%,rgba(35,196,168,.2),transparent 60%),
var(--bg);
color:var(--text);
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

.container{
max-width:900px;
margin:40px auto;
padding:0 20px;
}

h1{
margin:0 0 5px;
font-size:24px;
}

.subtitle{
color:var(--muted);
font-size:14px;
margin-bottom:20px;
}

.card{
background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
border:1px solid var(--border);
border-radius:var(--radius);
padding:18px;
}

.dropzone{
border:2px dashed rgba(255,255,255,.2);
border-radius:12px;
padding:24px;
text-align:center;
cursor:pointer;
color:var(--muted);
transition:.2s;
margin-bottom:15px;
}

.dropzone:hover{
border-color:var(--accent);
background:rgba(124,92,255,.06);
}

input[type=file]{display:none;}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
margin-bottom:15px;
}

button{
border:none;
padding:9px 14px;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:.2s;
}

.primary{
background:linear-gradient(135deg,var(--accent),var(--accent2));
color:white;
}

.secondary{
background:rgba(255,255,255,.08);
color:var(--text);
}

button:disabled{opacity:.4}

input[type=number]{
background:rgba(0,0,0,.3);
border:1px solid var(--border);
color:var(--text);
padding:6px 8px;
border-radius:8px;
width:90px;
}

.progress{
height:6px;
background:rgba(255,255,255,.08);
border-radius:999px;
overflow:hidden;
margin-bottom:15px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--accent),var(--accent2));
transition:.3s;
}

.file{
display:flex;
justify-content:space-between;
padding:10px 14px;
border-radius:10px;
background:rgba(255,255,255,.04);
border:1px solid var(--border);
margin-bottom:8px;
font-size:13px;
}

.status.done{color:var(--accent2)}
.status.error{color:#ff5c7a}
</style>
</head>

<body>

<div class="container">

<h1>Конвертер изображений</h1>
<div class="subtitle">
1) Добавь файлы → 2) Нажми «Конвертировать» → 3) Скачай ZIP.  
Работает локально в браузере.
</div>

<div class="card">

<div class="dropzone" id="dropzone">
Перетащи файлы сюда или нажми для выбора
<input type="file" id="fileInput" multiple
accept=".jpg,.jpeg,.png,.webp,.tif,.tiff,.heic,.heif,.img,image/*">
</div>

<div class="controls">
<label>Качество JPG</label>
<input type="number" id="quality" value="0.92" min="0.5" max="1" step="0.01">
<button class="primary" id="convertBtn">Конвертировать</button>
<button class="secondary" id="zipBtn" disabled>Скачать ZIP</button>
<button class="secondary" id="clearBtn">Очистить</button>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<div id="fileList"></div>

</div>
</div>

<script>
const fileInput=document.getElementById("fileInput");
const dropzone=document.getElementById("dropzone");
const fileList=document.getElementById("fileList");
const bar=document.getElementById("bar");
const zipBtn=document.getElementById("zipBtn");

let items=[];

function fmt(n){return (n/1024/1024).toFixed(2)+" MB";}
function ext(n){return n.split(".").pop().toLowerCase();}
function base(n){return n.replace(/\.[^/.]+$/,"");}

dropzone.onclick=()=>fileInput.click();
fileInput.onchange=e=>addFiles(e.target.files);

dropzone.ondragover=e=>{e.preventDefault();}
dropzone.ondrop=e=>{
e.preventDefault();
addFiles(e.dataTransfer.files);
};

function addFiles(files){
for(const f of files){
items.push({file:f,status:"queued"});
}
render();
}

function render(){
fileList.innerHTML="";
items.forEach(it=>{
const div=document.createElement("div");
div.className="file";
div.innerHTML=`
<span>${it.file.name} (${fmt(it.file.size)})</span>
<span class="status ${it.status}">${it.status}</span>
`;
fileList.appendChild(div);
});
}

async function convertOne(it,q){

const e=ext(it.file.name);

// HEIC
if(e==="heic"||e==="heif"){
const result=await heic2any({
blob:it.file,
toType:"image/jpeg",
quality:q
});
return Array.isArray(result)?result[0]:result;
}

// TIFF
if(e==="tif"||e==="tiff"){
const buf=await it.file.arrayBuffer();
const ifds=UTIF.decode(buf);
if(!ifds||!ifds.length)throw new Error("TIFF decode error");
UTIF.decodeImage(buf,ifds[0]);
const rgba=UTIF.toRGBA8(ifds[0]);

const canvas=document.createElement("canvas");
canvas.width=ifds[0].width;
canvas.height=ifds[0].height;
canvas.getContext("2d").putImageData(
new ImageData(new Uint8ClampedArray(rgba),
ifds[0].width,
ifds[0].height),0,0);

return await new Promise(r=>canvas.toBlob(r,"image/jpeg",q));
}

// IMG или другие
const img=await createImageBitmap(it.file);
const canvas=document.createElement("canvas");
canvas.width=img.width;
canvas.height=img.height;
canvas.getContext("2d").drawImage(img,0,0);
img.close();

return await new Promise(r=>canvas.toBlob(r,"image/jpeg",q));
}

document.getElementById("convertBtn").onclick=async()=>{
const q=parseFloat(document.getElementById("quality").value);
let done=0;

for(const it of items){
it.status="processing";
render();
try{
it.blob=await convertOne(it,q);
it.status="done";
}catch(e){
console.error(e);
it.status="error";
}
done++;
bar.style.width=(done/items.length*100)+"%";
render();
}

zipBtn.disabled=!items.some(i=>i.blob);
};

zipBtn.onclick=async()=>{
const zip=new JSZip();
items.filter(i=>i.blob).forEach(i=>{
zip.file(base(i.file.name)+".jpg",i.blob);
});
const blob=await zip.generateAsync({type:"blob"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="converted_images.zip";
a.click();
};

document.getElementById("clearBtn").onclick=()=>{
items=[];
bar.style.width="0%";
zipBtn.disabled=true;
render();
};
</script>

</body>
</html>
